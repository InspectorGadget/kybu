name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: windows, arch: amd64 }
          - { os: windows, arch: arm64 }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="kybu-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          VERSION="${{ github.ref_name }}"

          # Define LDFLAGS
          LDFLAGS="-s -w -X 'github.com/InspectorGadget/kybu/variables.Version=$VERSION'"

          echo "Building $BINARY_NAME with version $VERSION"
          go mod tidy
          go build -v -ldflags="$LDFLAGS" -o "$BINARY_NAME" .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kybu-${{ matrix.os }}-${{ matrix.arch }}
          path: kybu-${{ matrix.os }}-${{ matrix.arch }}*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: kybu-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/kybu-*
          generate_release_notes: true

  update-brew:
    name: Bump Homebrew Formula
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: kybu
          homebrew-tap: InspectorGadget/homebrew-tap
          tag-name: ${{ github.ref_name }}
          commit-message: "Update Kybu to ${{ github.ref_name }}"
        env:
          # You MUST set this secret in your GitHub repo settings
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
