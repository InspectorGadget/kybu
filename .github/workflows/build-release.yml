name: Build & Release
on:
   push:
      branches:
         - master
      tags:
         - "v*"
   pull_request:
      branches:
         - master
permissions:
   id-token: write
   contents: read
jobs:
   build:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v3
         - name: Set up Go
           uses: actions/setup-go@v5
           with:
              go-version: 1.25
         - name: Build
           run: |
              go mod tidy
              go build -o kybu .
         - name: Create GitHub Release
           if: startsWith(github.ref, 'refs/tags/v')
           uses: softprops/action-gh-release@v2
           with:
              files: kybu
              generate_release_notes: true
